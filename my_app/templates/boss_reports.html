<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Ishchilar Ro'yxati | Boss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --border-color: rgba(0, 242, 255, 0.3);
        }

        body {
            margin: 0; padding: 0; color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; overflow-x: hidden;
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }

        /* Video Fon */
        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.3) contrast(1.1);
            pointer-events: none;
        }

        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
            z-index: -1;
        }

        /* PWA Safe Area */
        @media screen and (display-mode: standalone) {
            .header-panel {
                padding-top: env(safe-area-inset-top, 30px) !important;
            }
        }

        .content {
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; background: rgba(0,0,0,0.6);
            padding: 15px 20px; border-radius: 20px;
            border-bottom: 2px solid var(--neon-cyan);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
        }

        .otryad-info {
            color: var(--neon-cyan); font-weight: 800; background: rgba(0, 242, 255, 0.1);
            padding: 10px 18px; border-radius: 12px; margin-bottom: 25px;
            display: inline-flex; align-items: center; gap: 10px;
            border: 1px solid var(--border-color);
            text-transform: uppercase; font-size: 13px; letter-spacing: 1px;
        }

        /* Ishchi Kartochkasi */
        .worker-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; margin-bottom: 18px; border-radius: 20px;
            display: flex; flex-direction: column; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (min-width: 500px) {
            .worker-card { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .worker-card:hover {
            transform: scale(1.02);
            border-color: var(--neon-cyan);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.15);
        }

        .worker-info { display: flex; align-items: center; gap: 18px; }
        .worker-icon { font-size: 40px; color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .worker-name { font-size: 18px; color: white; font-weight: 700; margin-bottom: 4px; }
        .worker-tabel { color: #888; font-size: 13px; font-family: monospace; }

        .action-buttons { display: flex; gap: 12px; }
        .btn {
            flex: 1; text-align: center;
            padding: 12px 20px; border-radius: 12px; font-weight: 800;
            font-size: 13px; text-decoration: none; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase;
        }

        .btn-view { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-view:active { background: rgba(255,255,255,0.2); transform: scale(0.95); }

        .btn-add {
            background: linear-gradient(45deg, var(--neon-cyan), #0072ff);
            color: #000;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }
        .btn-add:active { transform: scale(0.95); box-shadow: none; }

        h2 { color: var(--neon-cyan); margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }

        .no-workers {
            text-align: center; color: #fff; margin-top: 60px;
            background: rgba(15, 15, 15, 0.6); padding: 40px 20px;
            border-radius: 25px; border: 1px dashed var(--border-color);
            backdrop-filter: blur(10px);
        }

        /* Scrollbar dizayni */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body>
    <video autoplay loop playsinline muted id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="content">
        <div class="header-panel">
            <a href="/bosspage/" style="color:white; text-decoration:none; padding: 5px;">
                <i class="fas fa-chevron-left"></i>
            </a>
            <h2>Ishchilar Nazorati</h2>
            <div style="width: 25px;"></div> </div>

        <div class="otryad-info">
            <i class="fas fa-shield-alt"></i>
            {% if boss.otryad %}{{ boss.otryad.nomi }}{% else %}Bo'lim tayinlanmagan{% endif %}
        </div>

        <div class="worker-list">
            {% for w in workers %}
            <div class="worker-card">
                <div class="worker-info">
                    <i class="fas fa-user-circle worker-icon"></i>
                    <div>
                        <div class="worker-name">{{ w.full_name }}</div>
                        <div class="worker-tabel">TABEL: {{ w.tabel_raqami }}</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <a href="/boss/worker-report/{{ w.id }}/" class="btn btn-view">
                        <i class="fas fa-history"></i> Tarix
                    </a>
                    <a href="/boss/add-report/{{ w.id }}/" class="btn btn-add">
                        <i class="fas fa-edit"></i> Hisobot
                    </a>
                </div>
            </div>
            {% empty %}
            <div class="no-workers">
                <i class="fas fa-user-slash" style="font-size: 50px; margin-bottom: 20px; color: var(--neon-cyan); opacity: 0.5;"></i>
                <p style="font-weight: 700; letter-spacing: 1px; opacity: 0.8;">Guruhda ishchilar topilmadi.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Ishchilar ro\'yxati SW faol'))
                    .catch(err => console.log('SW xato:', err));
            });
        }

        // Kichik interaktivlik: kartochka bosilganda tebranish
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if ('vibrate' in navigator) navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>
