<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring | {{ display_name }}</title>

    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050505;
            --danger: #ff4747;
            --success: #00ff88;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif; background: var(--bg);
            overflow: hidden;
        }

        /* Dark Mode Map Layer */
        #map {
            height: 100vh; width: 100vw;
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%);
            background: #000;
        }

        /* UI Controls */
        .back-btn {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; width: 50px; height: 50px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(15px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        .info-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(5, 5, 5, 0.9); color: white;
            padding: 18px 30px; border-radius: 25px; display: flex; align-items: center;
            gap: 20px; backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); min-width: 320px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        .status-dot {
            width: 14px; height: 14px; background: var(--success); border-radius: 50%;
            box-shadow: 0 0 15px var(--success); animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1.3); opacity: 0.5; box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(1); opacity: 1; }
        }

        .worker-label {
            font-family: 'Orbitron'; font-size: 14px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; color: #fff;
        }

        #update-time {
            font-family: 'JetBrains Mono', monospace; color: var(--accent);
            font-weight: 800; font-size: 16px; min-width: 85px; text-align: right;
        }

        /* Marker Styling */
        .ymaps-2-1-79-placemark { filter: invert(100%) hue-rotate(-180deg); }
        .ymaps-2-1-79-copyright, .ymaps-2-1-79-map-copyrights-promo { display: none !important; }
    </style>
</head>
<body>
    <a href="/active-workers/" class="back-btn"><i class="fas fa-chevron-left"></i></a>

    <div id="map"></div>

    <div class="info-panel">
        <div class="status-dot"></div>
        <div style="display: flex; flex-direction: column; flex-grow: 1;">
            <span class="worker-label">{{ display_name }}</span>
            <span style="font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">LIVE MONITORING ENABLED</span>
        </div>
        <div style="height: 30px; width: 1px; background: rgba(255,255,255,0.15);"></div>
        <div id="update-time">SYNCING</div>
    </div>

    <script type="text/javascript">
        ymaps.ready(function () {
            var startCoords = [{{ start_lat }}, {{ start_lng }}];

            var myMap = new ymaps.Map("map", {
                center: startCoords,
                zoom: 17,
                controls: [],
                behaviors: ['drag', 'scrollZoom', 'dblClickZoom', 'multiTouch']
            });

            // Maxsus kiber marker yaratish
            var workerMarker = new ymaps.Placemark(startCoords, {
                hintContent: '{{ display_name }}',
                balloonContent: '<b>Xodim:</b> {{ display_name }}<br><b>Holat:</b> Onlayn'
            }, {
                preset: 'islands#cyanCircleDotIconWithCaption',
                iconCaptionMaxWidth: '150'
            });

            myMap.geoObjects.add(workerMarker);

            function updateLocation() {
                fetch('/get-location/{{ worker.id }}/')
                    .then(response => response.json())
                    .then(data => {
                        if (data.lat && data.lng) {
                            var newCoords = [data.lat, data.lng];

                            // Markerni silliq yurgizish
                            workerMarker.geometry.setCoordinates(newCoords);

                            // Xaritani xodimga qarab silliq surish
                            myMap.panTo(newCoords, {
                                flying: true,
                                duration: 1500,
                                timingFunction: 'ease-in-out'
                            });

                            var now = new Date();
                            var timeStr = now.toLocaleTimeString('uz-UZ', { hour12: false });
                            document.getElementById('update-time').innerText = timeStr;
                        }
                    })
                    .catch(err => {
                        console.error("Signal yo'qoldi:", err);
                        document.getElementById('update-time').innerText = "SIGNAL LOSS";
                        document.getElementById('update-time').style.color = "var(--danger)";
                    });
            }

            // Har 5 soniyada yangilanish (Serverga yuklama tushmasligi uchun optimal vaqt)
            setInterval(updateLocation, 5000);

            // Dastlabki ishga tushirish
            setTimeout(updateLocation, 1000);
        });
    </script>
</body>
</html>
