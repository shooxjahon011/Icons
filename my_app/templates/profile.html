<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <meta name="theme-color" content="#00f2ff">

    <title>Profil | {{ user.login }}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff4747;
            --glass: rgba(0, 0, 0, 0.75);
            --border: rgba(0, 242, 255, 0.3);
        }

        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center;
            align-items: center; background: #000; font-family: 'Rajdhani', sans-serif;
            color: white; padding: 20px; overflow-x: hidden;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.2) contrast(1.2);
        }

        .overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent, #000); z-index: -1;
        }

        .profile-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 35px 25px; border-radius: 40px; width: 100%; max-width: 380px; text-align: center;
            border: 1px solid var(--border); box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            position: relative; animation: profileFade 0.6s ease-out;
        }

        @keyframes profileFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Avatar */
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            padding: 3px; background: #000;
        }

        .upload-btn {
            position: absolute; bottom: 5px; right: 5px; background: var(--neon); color: #000;
            width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; font-size: 14px; border: 3px solid #000;
            transition: 0.3s;
        }
        .upload-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon); }

        h2 { font-family: 'Orbitron'; color: #fff; margin: 5px 0; font-size: 20px; letter-spacing: 2px; }

        .razryad-badge {
            background: rgba(0, 242, 255, 0.1); color: var(--neon); padding: 6px 16px;
            border-radius: 50px; font-size: 13px; font-weight: bold; margin: 10px 0;
            display: inline-block; border: 1px solid var(--border);
            font-family: 'Orbitron'; letter-spacing: 1px;
        }

        .tabel-label { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 700; margin-bottom: 25px; display: block; letter-spacing: 1px; }

        /* Inputs */
        .input-group { text-align: left; margin-bottom: 18px; position: relative; }
        label { font-size: 10px; color: var(--neon); margin-left: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        .field-wrapper { position: relative; margin-top: 5px; }
        .field-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px 15px 14px 45px; border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: #fff; outline: none; box-sizing: border-box;
            font-weight: 600; font-family: 'Rajdhani'; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }

        .save-btn {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: var(--neon); color: #000; font-family: 'Orbitron';
            font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;
            font-size: 14px;
        }
        .save-btn:active { transform: scale(0.96); }

        .logout-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; margin-top: 20px; padding: 14px; border-radius: 18px;
            background: rgba(255, 71, 71, 0.08); color: var(--danger);
            text-decoration: none; font-size: 14px; font-weight: bold;
            border: 1px solid rgba(255, 71, 71, 0.2); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        .back-link {
            color: rgba(255,255,255,0.4); text-decoration:none; display:inline-block;
            margin-top:25px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--neon); }

        .toggle-pass {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); cursor: pointer;
        }
    </style>
</head>
<body>
    <video loop playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="profile-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="avatar-container">
                <img src="{{ avatar_url }}" class="avatar" id="preview" alt="User Avatar">
                <label for="file-upload" class="upload-btn"><i class="fas fa-camera"></i></label>
                <input id="file-upload" name="profile_pic" type="file" style="display:none;" onchange="previewImage(this)">
            </div>

            <h2>{{ user.login }}</h2>
            <div class="razryad-badge">
                <i class="fas fa-bolt"></i> RAZRYAD: {{ user_razryad }}
            </div>
            <span class="tabel-label">TABEL №: {{ user.tabel_raqami }}</span>

            <div class="input-group">
                <label>Foydalanuvchi nomi:</label>
                <div class="field-wrapper">
                    <i class="fas fa-user-edit"></i>
                    <input type="text" name="display_name" value="{{ user.login }}" placeholder="Ism...">
                </div>
            </div>

            <div class="input-group">
                <label>Parol (Yashirin):</label>
                <div class="field-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" id="pass-field" name="password" value="{{ user.password }}">
                    <i class="fas fa-eye toggle-pass" onclick="togglePassword()"></i>
                </div>
            </div>

            <button type="submit" class="save-btn">O'zgarishlarni saqlash</button>
        </form>

        <a href="/logout/" class="logout-btn"><i class="fas fa-power-off"></i> Tizimdan chiqish</a>
        <a href="/second/" class="back-link">← Orqaga qaytish</a>
    </div>

    <script>
        // Rasm preview funksiyasi
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Parolni ko'rsatish/yashirish
        function togglePassword() {
            const passField = document.getElementById('pass-field');
            const icon = event.target;
            if (passField.type === "password") {
                passField.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passField.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Video boshqaruvi
        const video = document.getElementById('bg-video');
        window.addEventListener('load', () => {
            video.muted = true; // Avtomatik o'ynashi uchun ko'pincha muted bo'lishi kerak
            video.play().catch(() => {
                console.log("Video avtomatik boshlanmadi.");
            });
        });
    </script>
</body>
</html>
