<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <meta name="theme-color" content="#050505">

    <title>Faollashtirish | TemirYo'l</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00f2ff;
            --telegram: #0088cc;
            --glass: rgba(0, 0, 0, 0.75);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; height: 100vh; display: flex;
            justify-content: center; align-items: center;
            background: #000; font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        #bg-video {
            position: fixed; inset: 0; min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover; filter: brightness(0.2) contrast(1.1);
        }

        .overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent, #000);
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 45px 30px;
            border-radius: 45px;
            width: 90%; max-width: 380px;
            text-align: center;
            border: 1px solid var(--border);
            color: white;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            animation: cardFade 0.6s ease-out;
        }

        @keyframes cardFade { from { opacity: 0; transform: translateY(30px); } }

        h3 {
            font-family: 'Orbitron'; font-size: 20px; font-weight: 800;
            text-transform: uppercase; color: #fff; margin: 20px 0 10px;
            letter-spacing: 2px;
        }

        .info {
            font-size: 14px; color: rgba(255,255,255,0.5);
            margin-bottom: 30px; line-height: 1.5; font-weight: 600;
        }

        .bot-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: var(--telegram); color: white; padding: 18px;
            border-radius: 20px; text-decoration: none;
            margin-bottom: 30px; font-weight: 700; font-family: 'Orbitron';
            font-size: 12px; letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2);
        }
        .bot-btn:hover { background: #0099e6; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 136, 204, 0.3); }

        input {
            width: 100%; padding: 20px; border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: var(--accent);
            margin-bottom: 25px; text-align: center; font-size: 28px;
            letter-spacing: 8px; outline: none; transition: 0.3s;
            font-family: 'Orbitron'; font-weight: 700;
        }
        input:focus { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        input::placeholder { letter-spacing: normal; font-size: 12px; color: rgba(255,255,255,0.2); text-transform: uppercase; font-family: 'Rajdhani'; }

        .submit-btn {
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: var(--accent);
            color: #000; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Orbitron'; font-size: 14px;
            transition: 0.4s; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3);
        }
        .submit-btn:active { transform: scale(0.96); }

        .error-msg { background: rgba(255, 71, 71, 0.1); color: #ff4747; padding: 15px; border-radius: 18px; margin-bottom: 20px; font-size: 13px; font-weight: 700; border: 1px solid rgba(255, 71, 71, 0.3); }

        .user-id { margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.3); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .user-id span { color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="card">
        <div class="security-icon">
            <i class="fas fa-shield-halved" style="font-size: 55px; color: var(--accent); filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));"></i>
        </div>

        <h3>TASDIQLASH</h3>
        <p class="info">Profilni faollashtirish uchun Telegram bot yuborgan 6 xonali maxfiy kodni kiriting.</p>

        {% if error %}
            <div class="error-msg"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <a href="https://t.me/ReGiStRaTsIyATY_bot" class="bot-btn" target="_blank">
            <i class="fab fa-telegram-plane"></i> BOTDAN KOD OLISH
        </a>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="login" value="{{ login_val }}">
            <input type="text" name="activation_code" placeholder="......" required maxlength="6" autocomplete="off" inputmode="numeric">
            <button type="submit" class="submit-btn">FAOLLASHTIRISH</button>
        </form>

        <div class="user-id">
            LOGIN: <span>{{ login_val }}</span>
        </div>
    </div>

    <script>
        // Avtomatik video nazorati
        const video = document.getElementById('bg-video');
        window.addEventListener('load', () => {
            video.play().catch(() => {});
        });
    </script>
</body>
</html>
